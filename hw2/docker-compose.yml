services:
  mysql:
    image: mysql:8.0
    container_name: polinus_db_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: polinus_db
      MYSQL_USER: polinus
      MYSQL_PASSWORD: adpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  mysql_data: