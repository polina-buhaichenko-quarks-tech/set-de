services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: amazon_cluster
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE keyspaces' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    volumes:
      - cassandra_data:/var/lib/cassandra

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_DC: datacenter1
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  cassandra_data: